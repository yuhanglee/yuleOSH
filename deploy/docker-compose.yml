version: "3.8"

# =============================================================================
# yuleOSH Production Deployment — Docker Compose
# =============================================================================
# Usage:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Environment variables are loaded from deploy/.env.production (create from
# deploy/.env.production.example) and process environment variables.
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # --- PostgreSQL (Production database) ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${YULEOSH_DB_USER:-yuleosh}
      POSTGRES_PASSWORD: ${YULEOSH_DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${YULEOSH_DB_NAME:-yuleosh}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${YULEOSH_DB_USER:-yuleosh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuleosh-net
    logging: *default-logging

  # --- Backend (Python HTTP server) ---
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      YULEOSH_DB_URL: "postgresql://${YULEOSH_DB_USER:-yuleosh}:${YULEOSH_DB_PASSWORD:-changeme123}@db:5432/${YULEOSH_DB_NAME:-yuleosh}"
      YULEOSH_JWT_SECRET: ${YULEOSH_JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      YULEOSH_BASE_URL: ${YULEOSH_BASE_URL:-http://localhost:8080}
      YULEOSH_PORT: "8080"
      YULEOSH_NOTIFY_EMAIL_SMTP: ${YULEOSH_NOTIFY_EMAIL_SMTP:-}
      YULEOSH_NOTIFY_EMAIL_FROM: ${YULEOSH_NOTIFY_EMAIL_FROM:-}
      YULEOSH_NOTIFY_EMAIL_TO: ${YULEOSH_NOTIFY_EMAIL_TO:-}
      OSH_HOME: /data
    volumes:
      - osh-data:/data
    ports:
      - "${YULEOSH_PORT:-8080}:8080"
    networks:
      - yuleosh-net
    logging: *default-logging

  # --- Nginx (Reverse proxy + HTTPS) ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-data:/etc/letsencrypt
      - certbot-logs:/var/log/letsencrypt
    networks:
      - yuleosh-net
    logging: *default-logging

  # --- Certbot (Let's Encrypt auto-renewal) ---
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-logs:/var/log/letsencrypt
      - ./nginx/challenge:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/html; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx
    networks:
      - yuleosh-net

volumes:
  pgdata:
  osh-data:
  certbot-data:
  certbot-logs:

networks:
  yuleosh-net:
    driver: bridge
