# =============================================================================
# yuleOSH — Production Nginx Configuration
# =============================================================================
# Routes:
#   /               → Next.js frontend (port 3000)
#   /api/*          → Python backend (port 8080)
#   /static/*       → Frontend static assets (long cache)
#   /_next/static/* → Next.js build assets (immutable cache)
#   /ws/*           → WebSocket (future)
# =============================================================================

# Upstreams
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8080;
}

# ──────────────────────────────────────────────
# HTTP → HTTPS redirect
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN} _;

    # Let's Encrypt ACME challenge pass-through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────
# HTTPS server
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN} _;

    # ── SSL ───────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    # HSTS (1 year, include subdomains, preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security headers ──────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "0" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy (tune for production)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self' data:;
        connect-src 'self' https://${DOMAIN};
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    " always;

    # ── Size limits ───────────────────────────
    client_body_buffer_size       16k;
    client_header_buffer_size     1k;
    client_max_body_size          50m;
    large_client_header_buffers   4 8k;

    # ── Timeouts ──────────────────────────────
    proxy_connect_timeout         60s;
    proxy_send_timeout            60s;
    proxy_read_timeout            120s;

    # ── Gzip ──────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Logging ───────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/error.log warn;

    # ──────────────────────────────────────────
    # API backend (proxy to Python :8080)
    # ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;

        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # Strip cookie path issues
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Stripe webhook (special: needs raw body)
    location /api/stripe/webhook {
        proxy_pass http://backend;

        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_set_header Stripe-Signature    $http_stripe_signature;

        # Do NOT buffer — webhooks need raw body
        proxy_request_buffering off;

        add_header Cache-Control "no-store" always;
    }

    # ──────────────────────────────────────────
    # Next.js immutable build assets (long cache)
    # ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;

        # Immutable — content hash in filename
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ──────────────────────────────────────────
    # Static assets from frontend
    # ──────────────────────────────────────────
    location /static/ {
        proxy_pass http://frontend;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ──────────────────────────────────────────
    # Favicon & robots
    # ──────────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://frontend;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /robots.txt {
        proxy_pass http://frontend;
    }

    # ──────────────────────────────────────────
    # Everything else → Next.js frontend (SSR)
    # ──────────────────────────────────────────
    location / {
        proxy_pass http://frontend;

        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";

        # Don't cache HTML (SSR pages are dynamic)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ──────────────────────────────────────────
    # Deny hidden files
    # ──────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
