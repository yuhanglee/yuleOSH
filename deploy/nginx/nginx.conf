worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;

    # ── MIME types ──────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── Rate limiting ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ── Upstream ────────────────────────────────────────────────────────────
    upstream yuleosh_backend {
        server backend:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yuleosh.yourdomain.com;  # REPLACE WITH YOUR DOMAIN

        # SSL certificates (managed by certbot)
        ssl_certificate /etc/letsencrypt/live/yuleosh.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yuleosh.yourdomain.com/privkey.pem;

        # ── Security headers ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://js.stripe.com; img-src 'self' data: blob:; connect-src 'self' https://api.stripe.com; object-src 'none'; base-uri 'self';" always;

        # ── Backend proxy ───────────────────────────────────────────────────
        location / {
            proxy_pass http://yuleosh_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 120s;

            # Rate limiting
            limit_req zone=api_limit burst=50 nodelay;
        }

        # ── Auth endpoints (stricter rate limiting) ─────────────────────────
        location /api/auth/ {
            proxy_pass http://yuleosh_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            limit_req zone=auth_limit burst=10 nodelay;
        }

        # ── Stripe webhook (no rate limiting) ───────────────────────────────
        location /api/v1/subscription/webhook {
            proxy_pass http://yuleosh_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Static assets ───────────────────────────────────────────────────
        location /static/ {
            alias /app/data/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check ────────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://yuleosh_backend;
            proxy_http_version 1.1;
        }

        # ── Deny access to sensitive paths ──────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ /(\.env|\.git|node_modules) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Error pages ─────────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /500.html;
    }
}

