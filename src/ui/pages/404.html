<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuleOSH · 404 - 页面未找到</title>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --border: #1e293b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --blue: #3b82f6;
  --green: #10b981;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 480px;
}
.error-icon { font-size: 64px; margin-bottom: 16px; }
h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
p { color: var(--text2); line-height: 1.7; margin-bottom: 24px; font-size: 14px; }
.links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
a {
  padding: 10px 24px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: all 0.2s;
}
a.primary {
  background: var(--blue);
  color: #fff;
}
a.primary:hover { background: #2563eb; transform: translateY(-1px); }
a.secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
a.secondary:hover { border-color: var(--blue); }
pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text2);
  margin: 20px 0;
  text-align: left;
  overflow-x: auto;
}
</style>
</head>
<body>
<div class="container">
  <div class="error-icon">🔍</div>
  <h1>404</h1>
  <p>页面未找到<br>你要找的页面可能已被移动、删除，或从未存在过。</p>
  <div class="links">
    <a href="/dashboard" class="primary">← 回到 Dashboard</a>
    <a href="/" class="secondary">🏠 首页</a>
  </div>
</div>
</body>
</html>
