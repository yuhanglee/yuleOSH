name: autosar-classic
version: 1.0.0
description: AUTOSAR Classic Platform project template with ARXML and RTE configuration
platforms: [arm, stm32, renesas]
tags: [autosar, automotive, ecu, safety, aspice]
spec_sections:
  - System Requirements
  - Software Requirements (SW-C)
  - RTE Configuration
  - BSW Configuration
