# yuleOSH Pipeline Configuration — Generic Python
steps:
  - id: spec-parse
    name: Spec Parsing
    handler: spec_parse
  - id: requirements-analysis
    name: Requirements Analysis
    handler: super_analysis
  - id: sdd
    name: System Design Document
    handler: hermes_prd
  - id: code-gen
    name: Code Generation
    handler: claude_dev
  - id: internal-review
    name: Internal Review
    handler: internal_review
  - id: test-plan
    name: Test Plan Generation
    handler: test_planning
  - id: code-review
    name: Code Review
    handler: hermes_review
  - id: unit-test
    name: CI Layer 1
    handler: ci_layer1
  - id: system-verification
    name: CI Layer 2
    handler: ci_layer2
ci_layers:
  L1: {unit_test: true, lint: true, type_check: true}
  L2: {integration_test: true, coverage_report: true}
review_gates:
  - {type: internal, before: code-gen}
  - {type: code_review, before: system-verification}
