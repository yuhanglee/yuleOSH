name: stm32-hal
version: 1.0.0
description: STM32 HAL library project template with FreeRTOS integration
platforms: [stm32, arm]
tags: [stm32, hal, mcu, freertos]
spec_sections:
  - System Requirements
  - Software Requirements
  - HAL Driver Configuration
  - FreeRTOS Integration
  - Peripheral Configuration
  - Test Plan
pipeline_config:
  default_steps: [spec-parse, requirements-analysis, sdd, code-gen, internal-review, test-plan, code-review, unit-test, cross-compile, flash-debug, system-verification]
  ci_layers: [L1, L2, L3]
